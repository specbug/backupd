name: backupd

services:
  backupd:
    build: .
    restart: always
    volumes:
      - odyssey-data:/sources/odyssey:ro
      - ./jobs.yml:/etc/backupd/jobs.yml:ro
    environment:
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}

volumes:
  odyssey-data:
    external: true
    name: odyssey-data
